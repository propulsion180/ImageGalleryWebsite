<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.2" integrity="sha384-L6OqL9pRWyyFU3+/bjdSri+iIphTN/bvYyM37tICVyOJkWZLpP2vGn6VUEXgzg6h" crossorigin="anonymous"></script>

</head>
<body>
    <div class="image-container">
        <div class="image-item">
            <div id="titleBox">
                {{ block "titleb" . }}
                <h1 id="title">{{.data }}</h1>
                {{ end }}
            </div>
            <button onclick="window.location.href='/';">Main Page</button>
            <button onclick="window.location.href='/signup';">Sign Up</button>
            <button onclick="window.location.href='/logout';">Logout</button>

            <form hx-post="/login" hx-target="#title" hx-swap="innerHTML" >
                <div>
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" class="form-control" /><br><br>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control" /><br><br>
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
    
</body>
</html>
