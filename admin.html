
<h1 id="title">Pictures taken by Migada Perera</h1><br>
<button hx-get="/main" hx-target="#theBody" hx-swap="innerHTML" hx-push-url="/main">Main Page</button><br>
<form hx-post="/admin/addimage/" hx-target="#image-list" hx-swap="beforeend" enctype="multipart/form-data" hx-replace-url="/admin/">
    <div>
        <label for="Description">Description</label>
        <input type="text" name="description" id="description" class="form-control" /><br><br>
    </div>
    <div>
        <label for="iso">ISO</label>
        <input type="text" name="iso" id="iso" class="form-control" /><br><br>
    </div>
    <div>
        <label for="shutter-speed">Shutter Speed</label>
        <input type="text" name="shutter-speed" id="shutter-speed" class="form-control" /><br><br>
    </div>
    <div>
        <label for="aperture">Aperture</label>
        <input type="text" name="aperture" id="aperture" class="form-control" /><br><br>
    </div>
    <div>
        <label for="location">Location</label>
        <input type="text" name="location" id="location" class="form-control" /><br><br>
    </div>
    <div>
        <label for="file-chooser">image</label>
        <input type="file" name="image" id="file-chooser" class="form-control" accept="image/*" /><br><br>

    <button type="submit">Submit</button>
</form>
<ul class="image-list" id="image-list">
    {{ range .data }}
    {{ block "simple-list" . }}
    <li style="color: #ebdbb2;">{{ .FilePath}} - {{ .Description }} - {{ .ISO }} - {{ .ShutterSpeed }} - {{ .Aperture }} - {{ .Location }}</li>
    {{ end }}
    {{ end }}
</ul>
